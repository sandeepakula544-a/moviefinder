<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Finder</title>

    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">

    <h1>🎬 Movie Finder</h1>

    <p class="subtitle">
        Find movies based on language and genre
    </p>

    <div class="controls">

        <div class="box">

            <label for="language">
                Language
            </label>

            <select id="language">

                <option >
                    Select Language
                </option>

                <option>English</option>
                <option>Hindi</option>
                <option>Telugu</option>
                <option>Tamil</option>
                <option>Malayalam</option>

            </select>

        </div>

        <div class="box">

            <label for="genre">
                Genre
            </label>

            <select id="genre">

                <option value="">
                    Select Genre
                </option>

                <option>Action</option>
                <option>Comedy</option>
                <option>Drama</option>
                <option>Thriller</option>
                <option>Romance</option>
                <option>Horror</option>
                <option>Sci-Fi</option>

            </select>

        </div>
        <div class="search">
            <button id="searchBtn">
                Search Movies
            </button>
        </div>
        

    </div>

    <div id="movieContainer">

        <!-- Movie cards will come here -->

    </div>

</div>

<script src="index.js"></script>

</body>
</html>
